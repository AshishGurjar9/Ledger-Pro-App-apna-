    /* Overlay */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 999;

      /* center content */
      align-items: center;
      justify-content: center;
    }

    /* जब popup open होगा */
    .modal.show {
      display: flex;
    }

    /* Popup box */
    .modal-box {
      background: #ffffff;
      width: 90%;
      max-width: 320px;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);

      animation: popup 0.2s ease-in-out;
    }

    /* Date input */
    .modal-box input[type="date"] {
      width: 100%;
      padding: 10px;
      margin-top: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
      outline: none;
    }

    /* Buttons */
    .modal-box button {
      margin: 10px 5px 0;
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    /* OK button */
    .modal-box button:first-of-type {
      background: rgb(19, 203, 68);
      color: white;
    }

    /* Cancel button */
    .modal-box button:last-of-type {
      background: red;
      color: white;
    }

    /* Animation */
    @keyframes popup {
      from {
        transform: scale(0.8);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    function formatDate(d) {
      let dt = new Date(d);
      let day = String(dt.getDate()).padStart(2, '0');
      let month = String(dt.getMonth() + 1).padStart(2, '0');
      let year = dt.getFullYear();
      return `${day}/${month}/${year}`;
    }

    function parseDate(ddmmyyyy) {
      let parts = ddmmyyyy.split('/');
      if (parts.length !== 3) return null;
      let day = parseInt(parts[0]);
      let month = parseInt(parts[1]) - 1;
      let year = parseInt(parts[2]);
      let dt = new Date(year, month, day);
      if (isNaN(dt.getTime())) return null;
      return dt.toISOString().split('T')[0];
    }

    function updateCalcMode() {

        mode === "dates" ? "block" : "none";

      document.getElementById("calcDayField").style.display =

    function calculateInterest() {
      let amount = parseFloat(document.getElementById("c_amount").value);
      let rate = parseFloat(document.getElementById("c_rate").value);
      let mode = document.querySelector('input[name="calcMode"]:checked').value;

      if (!amount || !rate) {
        alert("Sab field bharo!");
        return;
      }

      let interest = 0;
      let total = 0;
      let displayTime = "";

      if (mode === "dates") {

        let start = document.getElementById("c_start").value;
        let end = document.getElementById("c_end").value;

        if (!start || !end) {
          alert("Start aur End date bharo!");
          return;
        }

        let d1 = new Date(start);
        let d2 = new Date(end);

        if (d2 <= d1) {
          alert("End date start se badi honi chahiye!");
          return;
        }

        let days = (d2 - d1) / (1000 * 60 * 60 * 24);

        let months = Math.floor(days / 30);
        let remDays = Math.floor(days % 30);
        let totalMonths = days / 30;

        interest = (amount * rate * totalMonths) / 100;
        total = amount + interest;

        displayTime = `<b>⏳ Time:</b> ${months} माह ${remDays} दिन <br>`;

      } else {

        let days = parseFloat(document.getElementById("c_days").value);

        if (!days || days <= 0) {
          alert("Valid days daalo!");
          return;
        }

        let totalMonths = days / 30;

        interest = (amount * rate * totalMonths) / 100;
        total = amount + interest;

        displayTime = `<b>⏳ Time:</b> ${days} दिन<br>`;
      }

      document.getElementById("calcResult").innerHTML = `
    ${displayTime}
    <b>💰 Interest:</b> ₹ ${interest.toFixed(2)} <br>
    <b>🔢 Total:</b> ₹ ${total.toFixed(2)}
  `;
    }


    function calculate(start, end) {
      let d1 = new Date(start);
      let d2 = new Date(end);
      let days = (d2 - d1) / (1000 * 60 * 60 * 24);
      let months = Math.floor(days / 30);
      let remDays = Math.floor(days % 30);
      return { months, remDays, total: days / 30 };
    }

    function continueLoan(name, index) {
      try {
        let user = users.find(u => u.name === name);

        if (!user) {
          alert("❌ User not found!");
          return;
        }
        let entry = user.entries[index];
        if (!entry) {
          alert("❌ Entry not found!");
          return;
        }

        // Calculate remaining on current amount
        let displayAmount = entry.amount;
        let tt = calculate(entry.start, todayStr);
        let currentInterest = (displayAmount * entry.rate * tt.total) / 100;
        let currentTotal = displayAmount + currentInterest;
        let remaining = currentTotal - entry.paid;

        if (remaining <= 0) {
          alert("✔ पूरा पैसा जमा हो चुका है");
          return;
        }

        let choice = prompt("क्या पैसा जमा किया? (yes / no)");
        if (!choice) return;

        let newAmount = 0;
        let status = "";
        let paidAmount = 0;

        entry.status = "";

        if (choice === "yes" || choice === "y" || choice === "YES") {
          paidAmount = parseFloat(prompt("कितना पैसा जमा किया?")) || 0;

          // Add payment
          entry.paid = parseFloat((entry.paid + paidAmount).toFixed(2));

          // Add to history
          if (!entry.hisabHistory) {
            entry.hisabHistory = [];
          }
          entry.hisabHistory.push({
            date: todayStr,
            paid: paidAmount
          });

          // Calculate remaining balance
          let remaining = parseFloat((currentTotal - entry.paid).toFixed(2));
          if (remaining < 0) remaining = 0;

          // New amount = remaining balance
          newAmount = remaining;
          entry.total = parseFloat(currentTotal.toFixed(2));

          // Set end date to today (when jama was done)
          entry.endDate = todayStr;

          entry.status = `✔ ₹${paidAmount} जमा किया`;
          status = `✔ ₹${paidAmount} जमा करके आगे बढ़ाया`;
        } else {
          newAmount = parseFloat(currentTotal.toFixed(2));
          entry.total = parseFloat(currentTotal.toFixed(2));
          entry.endDate = todayStr;
          entry.status = "❌ पैसा जमा नहीं किया पूरा जोड़कर आगे बढ़ाया";
          status = "❌ पैसा जमा नहीं किया, पूरा जोड़कर आगे बढ़ाया";
        }

        let baseKist = entry.kistNo || (index + 1);
        let count = user.entries.filter(e =>
          String(e.kistNo).startsWith(baseKist)
        ).length;

        let newKist = baseKist + "." + count;

        let newEntry = {
          amount: newAmount,
          originalAmount: newAmount,
          rate: entry.rate,
          start: todayStr, // Current date as start
          endDate: null, // End date will be set when jama is done
          months: 0,
          days: 0,
          interest: 0,
          total: newAmount, // New total = remaining balance
          paid: 0,
          hisabHistory: [],
          completed: false,
          kistNo: newKist,
          status: status
        };

        user.entries.push(newEntry);
        entry.completed = true;

        // entry.completed = "old";

        localStorage.setItem("users", JSON.stringify(users));
        alert("✅ कंटिन्यू हो गया!");

        // openUser(name);
        forceOpenUser = true;

        openUser(name);

      } catch (err) {
        console.error("Error in continueLoan:", err);
        alert("❌ Error: " + err.message);
      }
    }
    function deleteEntry(name, index) {

      if (!confirm("⚠️ Delete entry?")) return;

      let user = users.find(u => u.name === name);
      if (!user) return;

      let entry = user.entries[index];
      if (!entry) return;

      moveToRecycle("entry", {
        user: name,
        entry: structuredClone(entry)
      });

      user.entries.splice(index, 1);

      localStorage.setItem("users", JSON.stringify(users));

      // alert("🗑️ Moved to recycle");

      openUser(name);
    }

        user: name,
        entryIndex: entryIndex,
        history: historyItem
      });

      // ✅ original se remove
      entry.hisabHistory.splice(
        historyIndex,
        1
      );

      // ✅ save
      localStorage.setItem(
        "users",
        JSON.stringify(users)
      );

      alert("🗑️ History moved to recycle");

      document.getElementById("output")
        .setAttribute("data-open", "");

      toggleHisab();
    }

    function editNote(index) {
      let note = notes[index];
      if (note) {
        let newText = prompt("Edit your note:", note.text);
        if (newText !== null && newText.trim() !== "") {
          notes[index].text = newText.trim();
          localStorage.setItem("notes", JSON.stringify(notes));
          // showNotes();
          // viewNote(index); //
          openSavedNotes(); //  
        }
      }
    }

    // OPEN / CLOSE
    function openSecurity() {
      document.getElementById("securityPopup").style.display = "flex";

      let sec = JSON.parse(localStorage.getItem("securityLock")) || {};

      document.getElementById("securityActive").checked = sec.active || false;
      document.getElementById("lockOverview").checked = sec.overview || false;
      document.getElementById("lockAdd").checked = sec.add || false;
      document.getElementById("lockNotes").checked = sec.notes || false;
      document.getElementById("lockHistory").checked = sec.history || false;
      document.getElementById("lockMembers").checked = sec.members || false;
    }

    function closeSecurity() {
      document.getElementById("securityPopup").style.display = "none";
    }


    // PASSWORD SYSTEM
    function setOrChangePassword() {
      let saved = localStorage.getItem("appPass");

      if (!saved) {
        let p = prompt("Set Password:");
        if (p) localStorage.setItem("appPass", p);
        return;
      }

      let action = prompt("1=Change\n2=Remove\n3=Test");

      if (action === "1") {
        let old = prompt("Old password:");
        if (old === saved) {
          let np = prompt("New password:");
          localStorage.setItem("appPass", np);
          alert("Changed!");
        } else alert("Wrong!");
      }

      if (action === "2") {
        let old = prompt("Enter password:");
        if (old === saved) {
          localStorage.removeItem("appPass");
          alert("Removed!");
        } else alert("Wrong!");
      }

      if (action === "3") {
        let t = prompt("Enter password:");
        alert(t === saved ? "Correct" : "Wrong");
      }

    }


    // SAVE SECURITY
    function saveSecurity() {
      let data = {
        active: document.getElementById("securityActive").checked,
        overview: document.getElementById("lockOverview").checked,
        add: document.getElementById("lockAdd").checked,
        notes: document.getElementById("lockNotes").checked,
        history: document.getElementById("lockHistory").checked,
        members: document.getElementById("lockMembers").checked
      };

      localStorage.setItem("securityLock", JSON.stringify(data));
      alert("Saved!");
      closeSecurity();
    }


    // MAIN CHECK FUNCTION
    function checkAccess(page) {

      let sec = JSON.parse(localStorage.getItem("securityLock")) || {};
      let pass = localStorage.getItem("appPass");

      if (!sec.active || !pass) return true;
      if (!sec[page]) return true;

      let input = prompt("Enter password:");
      if (input === pass) {
        return true;
      } else {
        alert("Wrong password");
        return false;
      }
    }



    function checkLock(type) {

      let sec = JSON.parse(localStorage.getItem("securityLock"));

      // 👉 अगर security data नहीं है
      if (!sec) return true;

      // 👉 security OFF है
      if (sec.active !== true) return true;

      // 👉 उस page पर lock नहीं है
      if (sec[type] !== true) return true;

      let pass = localStorage.getItem("appPass");

      // 🔥 MAIN CHANGE
      if (!pass) {
        return true;   // ✔ ना alert, ना block
      }

      let input = prompt("Enter Password:");

      if (input === pass) {
        return true;
      } else {
        alert("❌ Wrong Password");
        return false;
      }
    }

    function mergeSelected() {

      let selected = document.querySelectorAll(".mergeBox:checked");

      if (selected.length < 2) {
        alert("⚠️ कम से कम 2 kist select karo!");
        return;
      }

      let userName = selected[0].dataset.user;
      let user = users.find(u => u.name === userName);

      let total = 0;
      let paid = 0;
      let rate = 0;


      let kistList = [];

      selected.forEach(cb => {

        let index = parseInt(cb.dataset.index);
        let userName = cb.dataset.user;

        let user = users.find(u => u.name === userName);
        if (!user) return;

        let e = user.entries[index];
        if (!e || e.completed) return;   // ✅ important

        kistList.push(e.kistNo || (index + 1));

        let calc = calculate(e.start, todayStr);
        let interest = (e.amount * e.rate * calc.total) / 100;

        total += e.amount + interest;
        paid += e.paid;
        rate = e.rate;

        e.completed = true;
      });

      let remaining = total - paid;

      user.entries.push({
        amount: remaining,
        originalAmount: remaining,
        rate: rate,
        start: todayStr,
        endDate: null,
        paid: 0,
        hisabHistory: [],
        completed: false,

        // 👇 यही main change
        kistNo: kistList.join(" + ") + " = MERGED",

        status: "🔀 Merged"
      });

      localStorage.setItem("users", JSON.stringify(users));

      closeMergePanel();

      alert("✅ Merge ho gaya!");
      closeMergePanel();
      openUser(userName);
    }

    function deleteEntry(name, index) {

      if (!confirm("⚠️ Delete entry?")) return;

      let user = users.find(u => u.name === name);
      if (!user) return;

      let entry = user.entries[index];
      if (!entry) return;

      // 🔥 FIX: always ensure unique identity
      entry.recycleId = entry.recycleId || crypto.randomUUID();

      moveToRecycle("entry", {
        id: entry.recycleId,
        user: name,
        entry: structuredClone(entry)
      });

      user.entries.splice(index, 1);

      localStorage.setItem("users", JSON.stringify(users));

      alert("🗑️ Moved to recycle");

      openUser(name);
    }
    function undoDelete() {

      let recycle = getRecycle();

      if (!recycle.length) {
        alert("Nothing to undo");
        return;
      }

      // 🔥 FIFO = FIRST ITEM
      let item = recycle.shift();

      if (!item) return;

      // ================= ENTRY =================
      if (item.type === "entry") {

        let user = users.find(u => u.name === item.data.user);

        if (user) {

          let entry = item.data.entry;

          entry.deleted = false;
          delete entry.deletedAt;

          let exists = user.entries.find(e => e.recycleId === entry.recycleId);

          if (!exists) {
            user.entries.push(entry);
          }
        }
      }

      // ================= NOTE =================
      else if (item.type === "note") {
        notes.push(item.data);
      }

      // ================= USER =================
      else if (item.type === "user") {
        users.push(item.data);
      }

      // ================= HISTORY =================
      else if (item.type === "history") {

        let user = users.find(u => u.name === item.data.user);

        if (user) {
          let entry = user.entries[item.data.entryIndex];
          if (entry) {
            entry.hisabHistory.push(item.data.history);
          }
        }
      }

      localStorage.setItem("users", JSON.stringify(users));
      localStorage.setItem("notes", JSON.stringify(notes));
      localStorage.setItem("recycle", JSON.stringify(recycle));

      alert("♻️ First deleted restored (LIFO)");

      openRecycleBin(true);
    }

    function openRecycleBin(refresh = false) {

      let popup = document.getElementById("recyclePopup");

      if (!refresh && popup.style.display === "flex") {
        popup.style.display = "none";
        return;
      }

      let recycleData = getRecycle();

      // 🔥 SAFE SORT (latest first)
      function getTime(item) {
        let t = item.date || item.deletedAt || item.createdAt;
        if (!t) return 0;
        let time = new Date(t).getTime();
        return isNaN(time) ? 0 : time;
      }

      recycleData.sort((a, b) => getTime(b) - getTime(a));

      let lang = localStorage.getItem("appLang") || "en";
      let t = langData[lang];

      let deletedCount = 0;

      let title = document.getElementById("recycleTitle");

      let html = `

type="text"
id="recycleSearch"
placeholder="${t.recycleSearch}"
onkeyup="filterRecycleBin()" />

    </button>

onclick="restoreAllDeleted()">

${t.restoreAll}

</button>

    <button onclick="emptyRecycleBin()" id="btnEmptyBin">
      🗑️ ${t.emptyBin || "Empty Bin"}
    </button>

    <br><br>
  `;

      // =========================
      // 🔥 SINGLE LOOP FIX (IMPORTANT)

      recycleData.forEach(item => {

        // ================= ENTRY =================
        if (item.type === "entry") {

          let e = item.data.entry;

          html += `

        // ================= NOTE =================

          html += `

          📝 Note<br>
          ${n.text || ""}<br><br>

          🕒 Deleted:
          ${item.date ? new Date(item.date).toLocaleString("en-IN") : "Unknown"}

          <br><br>

    function restoreAllDeleted() {

      if (!confirm("♻️ Restore ALL items?")) return;

      let recycle = getRecycle();

      // copy safely
      let items = [...recycle];

      items.forEach(item => {

        let index = recycle.findIndex(r => r.id === item.id);
        if (index === -1) return;

        let data = recycle[index];

        // ==== ENTRY ====
        if (data.type === "entry") {
          let user = users.find(u => u.name === data.data.user);
          if (user) {
            user.entries.push(data.data.entry);
          }
        }

        // ==== NOTE ====
        else if (data.type === "note") {
          notes.push(data.data);
        }

        // ==== USER ====
        else if (data.type === "user") {
          users.push(data.data);
        }

        // ==== HISTORY ====
        else if (data.type === "history") {
          let user = users.find(u => u.name === data.data.user);
          if (user) {
            let entry = user.entries[data.data.entryIndex];
            if (entry) {
              entry.hisabHistory.push(data.data.history);
            }
          }
        }

        // remove from recycle
        recycle.splice(index, 1);
      });

      // save ONCE
      localStorage.setItem("users", JSON.stringify(users));
      localStorage.setItem("notes", JSON.stringify(notes));
      localStorage.setItem("recycle", JSON.stringify(recycle));

      alert("♻️ All restored!");

      openRecycleBin(true);
      showAll();

      showNotes();

    }

    function restoreRecycle(id) {

      if (!confirm("♻️ Restore this item?"))
        return;

      let recycle = getRecycle();

      let index =
        recycle.findIndex(r => r.id === id);

      if (index === -1) return;

      let item = recycle[index];

      // 🟢 ENTRY
      if (item.type === "entry") {

        let user =
          users.find(u => u.name === item.data.user);

        if (user) {
          // remove duplicate safety
          let exists = user.entries.find(e => e.recycleId === item.data.entry.recycleId);

          if (!exists) {
            user.entries.push(item.data.entry);
          }
        }
      }

      //     item.data.entry.deleted = false;
      //     delete item.data.entry.deletedAt;

      //     user.entries.push(item.data.entry);
      //   }
      // }

      // 🟡 NOTE
      else if (item.type === "note") {

        item.data.deleted = false;
        delete item.data.deletedAt;

        notes.push(item.data);
      }

      // 🔵 USER
      else if (item.type === "user") {

        item.data.deleted = false;
        delete item.data.deletedAt;

        users.push(item.data);
      }

      // 🟣 HISTORY
      else if (item.type === "history") {

        let user =
          users.find(u => u.name === item.data.user);

        if (user) {

          let entry =
            user.entries[item.data.entryIndex];

          if (entry) {

            item.data.history.deleted = false;
            delete item.data.history.deletedAt;

            entry.hisabHistory.push(
              item.data.history
            );
          }
        }
      }

      // ❌ recycle se remove
      recycle.splice(index, 1);

      localStorage.setItem(
        "users",
        JSON.stringify(users)
      );

      localStorage.setItem(
        "notes",
        JSON.stringify(notes)
      );

      localStorage.setItem(
        "recycle",
        JSON.stringify(recycle)
      );

      // alert("♻️ Restored");

      openRecycleBin(true);

      showAll();

      showNotes();

    }

    async function generatePDF(htmlContent, fileName) {

      let temp = document.createElement("div");

      temp.innerHTML = htmlContent;

      temp.style.padding = "20px";
      temp.style.background = "#fff";
      temp.style.color = "#000";

      document.body.appendChild(temp);

      const canvas = await html2canvas(temp);

      const imgData = canvas.toDataURL("image/png");

      const { jsPDF } = window.jspdf;

      const pdf = new jsPDF("p", "mm", "a4");

      let width = 190;
      let height =
        (canvas.height * width) / canvas.width;

      pdf.addImage(imgData, "PNG", 10, 10, width, height);

      let pdfBlob = pdf.output("datauristring");

      document.body.removeChild(temp);

      return pdfBlob;
    }

   function checkSixMonthDue(users){

  let now = new Date();

  users.forEach(user => {

    let start = new Date(user.startDate);

    let diffMonths =
      (now - start) / (1000*60*60*24*30);

    if(diffMonths >= 6){

      sendNotification(
        "⚠️ Kist Due Alert",
        user.name + " ki kist 6 mahine se purani ho gayi hai"
      );

    }

  });

}

  checkSixMonthDue(users);

}

    const result_nor =
      document.getElementById("result_nor");

    const history_nor =
      document.getElementById("history_nor");

    const preview_nor =
      document.getElementById("preview_nor");

    

    function appendValue_nor(value) {

      if (value === "AC") {
        clearDisplay_nor();
        return;
      }

      if (result_nor.value === "0") {
        result_nor.value = "";
      }

      let current = result_nor.value;
      let lastChar = current.slice(-1);

      let operators = ['+', '-', '*', '/'];

      // 👉 Agar last me operator hai aur new bhi operator hai
      if (operators.includes(lastChar) &&
        operators.includes(value)) {

        // replace last operator (REAL CALCULATOR BEHAVIOR)
        result_nor.value =
          current.slice(0, -1) + value;

        updatePreview_nor();
        return;
      }

      result_nor.value += value;

      updatePreview_nor();
    }
    function clearDisplay_nor() {

      result_nor.value = "0";

      history_nor.innerHTML = "";

      preview_nor.innerHTML = "0";
    }

    function deleteLast_nor() {

      result_nor.value =
        result_nor.value.slice(0, -1);

      if (result_nor.value === "") {
        result_nor.value = "0";
      }

      updatePreview_nor();
    }

    function calculate_nor() {

      try {

        let expression =
          result_nor.value;

        history_nor.innerHTML =
          expression + " =";

        expression =
          expression.replace(
            /(\d+(\.\d+)?)%/g,
            '($1/100)');

        let answer =
          eval(expression);

        result_nor.value =
          parseFloat(answer.toFixed(10));

        preview_nor.innerHTML = "";

      }

      catch {

        result_nor.value = "Error";
      }
    }


    function openCalculator_norm() {

      document.getElementById(
        "calculatorPopup_norm"
      ).style.display = "flex";

      // background scroll ON
      document.body.style.overflow = "auto";


    }

    function closeCalculator_norm() {

      document.getElementById(
        "calculatorPopup_norm"
      ).style.display = "none";

      document.body.style.overflow = "auto";

    }

    function updatePreview_nor() {

      try {

        let expression =
          result_nor.value;

        let answer =
          eval(expression);

        if (!isNaN(answer)) {

          preview_nor.innerHTML =
            parseFloat(answer.toFixed(10));
        }

      }

      catch {

        preview_nor.innerHTML = "";
      }
    }
    let calcBox = document.getElementById("calcResizeBox");

    // default size (chhota)
    let scale = 0.6;

    // position
    let posX = 0;
    let posY = 0;

    // drag control
    let startX = 0;
    let startY = 0;
    let dragging = false;


    // 🔥 UPDATE FUNCTION (MAIN FIX)
    function updateBox() {
      calcBox.style.transform =
        `translate(calc(-50% + ${posX}px), calc(-50% + ${posY}px)) scale(${scale})`;
    }


    // 🔥 ZOOM (Ctrl + wheel desktop)
    calcBox.addEventListener("wheel", (e) => {
      if (!e.ctrlKey) return;

      e.preventDefault();

      scale += e.deltaY < 0 ? 0.1 : -0.1;

      if (scale < 0.4) scale = 0.4;
      if (scale > 1.5) scale = 1.5;

      updateBox();
    });


    // 🔥 START DRAG (mouse + touch)
    calcBox.addEventListener("mousedown", startDrag);
    calcBox.addEventListener("touchstart", startDrag, { passive: false });

    function startDrag(e) {
      dragging = true;

      let x = e.touches ? e.touches[0].clientX : e.clientX;
      let y = e.touches ? e.touches[0].clientY : e.clientY;

      startX = x - posX;
      startY = y - posY;
    }


    // 🔥 MOVE DRAG
    document.addEventListener("mousemove", moveDrag);
    document.addEventListener("touchmove", function(e){

  // 2 finger = zoom
  if(e.touches.length === 2) return;

  // 1 finger = drag
  moveDrag(e);

}, { passive:false });

    function moveDrag(e) {
      if (!dragging) return;

      let x = e.touches ? e.touches[0].clientX : e.clientX;
      let y = e.touches ? e.touches[0].clientY : e.clientY;

      posX = x - startX;
      posY = y - startY;

      updateBox();
    }


    // 🔥 STOP DRAG
    document.addEventListener("mouseup", stopDrag);
    document.addEventListener("touchend", stopDrag);


    function stopDrag() {
      dragging = false;
    }
