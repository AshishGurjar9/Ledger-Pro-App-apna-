<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <title>Ledger Pro Auth</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0ea5e9, #2563eb);
      padding: 20px;
    }

    .auth-box {
      width: 100%;
      max-width: 430px;
      background: white;
      border-radius: 24px;
      padding: 30px 25px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
      animation: fade .4s ease;
    }

    @keyframes fade {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      text-align: center;
      margin-bottom: 25px;
    }

    .logo img {
      width: 85px;
      height: 85px;
      border-radius: 20px;
      object-fit: cover;
    }

    .logo h1 {
      color: #2563eb;
      margin-top: 10px;
      font-size: 30px;
    }

    .logo p {
      color: #666;
      margin-top: 5px;
    }

    .tabs {
      display: flex;
      background: #f1f5f9;
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 25px;
    }

    .tabs button {
      flex: 1;
      padding: 14px;
      border: none;
      background: none;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: .3s;
    }

    .tabs .active {
      background: #2563eb;
      color: white;
    }

    .input-group {
      margin-bottom: 18px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #333;
    }

    .input-group input {
      width: 100%;
      padding: 14px;
      border: 2px solid #ddd;
      border-radius: 12px;
      outline: none;
      font-size: 15px;
      transition: .3s;
    }

    .input-group input:focus {
      border-color: #2563eb;
    }

    .show-pass {
      margin-top: 8px;
      font-size: 14px;
    }

    .auth-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      transition: .3s;
    }

    .auth-btn:hover {
      transform: scale(1.02);
    }

    .google-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: #ef4444;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    .extra {
      text-align: center;
      margin-top: 16px;
      color: #555;
    }

    .extra span {
      color: #2563eb;
      cursor: pointer;
      font-weight: bold;
    }

    .hidden {
      display: none;
    }

    #message {
      text-align: center;
      margin-top: 15px;
      font-weight: bold;
    }

    #strengthText {
      margin-top: 5px;
      font-size: 14px;
      font-weight: bold;
    }

    @media(max-width:500px) {

      .auth-box {
        padding: 25px 18px;
      }

    }

    .pass-box {
      position: relative;
    }

    .pass-box input {
      padding-right: 50px;
    }

    .eye {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      width: 24px;
      height: 24px;
      color: #6b7280;
      transition: 0.2s;
    }

    .eye svg {
      width: 24px;
      height: 24px;
      fill: #6b7280;
    }

    .eye:hover svg {
      fill: #2563eb;
    }





    .popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.popup-box{
  background:white;
  padding:25px;
  border-radius:20px;
  text-align:center;
  width:90%;
  max-width:320px;
}

.popup-box button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#2563eb;
  color:white;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}
  </style>
</head>

<body>

  <div class="auth-box">

    <div class="logo">

      <img src="icon.png">

      <h1>Ledger Pro</h1>

      <p id="secureText">Secure Finance Manager</p>

    </div>

    <div class="tabs">

      <button id="loginTab" class="active" onclick="showLogin()">

    <div id="loginForm">

      </div>
      <div class="input-group">

        <label id="passwordLabel">Password</label>

        <div class="pass-box">

          <input type="password" id="loginPassword" placeholder="Enter Password">

          <span class="eye" onclick="togglePassword('loginPassword', this)">
            <svg viewBox="0 0 24 24">
              <path d="M12 5c-7 0-10 7-10 7s3 7 10 7 10-7 10-7-3-7-10-7zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10z" />
              <circle cx="12" cy="12" r="2.5" />
            </svg>
          </span>

        </div>

      </div>

      <button class="auth-btn" onclick="loginUser()" id="loginBtn">
        🔐 Login

      </button>

      <button class="google-btn" onclick="googleLogin()" id="googleBtn">

        🔴 Google Login

      </button>

      <div class="extra">

        <span onclick="forgotPassword()" id="forgotText">

          Forgot Password?

        </span>

      </div>

    </div>

    <!-- SIGNUP -->

    <div id="signupForm" class="hidden">

      </div>

        <label id="email_1">Email</label>

        <input type="email" id="signupEmail" placeholder="Enter Email">

      </div>

      <div class="input-group">

        <label id="password_sin">Password</label>

        <div class="pass-box">

          <input type="password" id="signupPassword" placeholder="Create Password" oninput="checkStrength()">

          <span class="eye" onclick="togglePassword('signupPassword', this)">
            <svg viewBox="0 0 24 24">
              <path d="M12 5c-7 0-10 7-10 7s3 7 10 7 10-7 10-7-3-7-10-7zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10z" />
              <circle cx="12" cy="12" r="2.5" />
            </svg>
          </span>

        </div>

      </div>

      <div id="strengthText"></div>

      <div class="input-group">

        <label id="confirm_pass">Confirm Password</label>

        <div class="pass-box">

          <input type="password" id="confirmPassword" placeholder="Confirm Password">

          <span class="eye" onclick="togglePassword('confirmPassword', this)">
            <svg viewBox="0 0 24 24">
              <path d="M12 5c-7 0-10 7-10 7s3 7 10 7 10-7 10-7-3-7-10-7zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10z" />
              <circle cx="12" cy="12" r="2.5" />
            </svg>
          </span>


        </div>

      </div>
      <div class="input-group">

        <label id="recovery_w">Recovery Word</label>

        <input type="text" id="signupRecovery" placeholder="Favorite Name/ Book Name / Recovery Word">

      </div>

      <button class="auth-btn" onclick="signupUser()" id="createBtn">

        🚀 Create Account

      </button>
<div class="extra">

  </span>

</div>

    function showSignup() {

      signupForm.classList.remove("hidden");

      loginForm.classList.add("hidden");

      signupTab.classList.add("active");

      loginTab.classList.remove("active");
    }

    function showLogin() {

      loginForm.classList.remove("hidden");

      signupForm.classList.add("hidden");

      loginTab.classList.add("active");

      signupTab.classList.remove("active");
    }

    function togglePassword(id, icon) {

      let input = document.getElementById(id);

      if (input.type === "password") {
        input.type = "text";

        icon.innerHTML = `
      <svg viewBox="0 0 24 24">
        <path d="M2 2l20 20"></path>
        <path d="M12 5c-7 0-10 7-10 7s1.5 3.5 4.5 5.5"></path>
        <path d="M21 12s-3 7-9 7c-2 0-3.8-.6-5.2-1.5"></path>
      </svg>
    `;
      }
      else {
        input.type = "password";

        icon.innerHTML = `
      <svg viewBox="0 0 24 24">
        <path d="M12 5c-7 0-10 7-10 7s3 7 10 7 10-7 10-7-3-7-10-7zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/>
        <circle cx="12" cy="12" r="2.5"/>
      </svg>
    `;
      }
    }

    function checkStrength() {

      let pass =
        document.getElementById(
          "signupPassword"
        ).value;

      let text =
        document.getElementById(
          "strengthText"
        );

      if (pass.length < 4) {

        text.innerHTML =
          "🔴 Weak Password";

        text.style.color =
          "red";
      }

      else if (pass.length < 8) {

        text.innerHTML =
          "🟠 Medium Password";

        text.style.color =
          "orange";
      }

      else {

        text.innerHTML =
          "🟢 Strong Password";

        text.style.color =
          "green";
      }
    }

    function signupUser() {

      let name =
        document.getElementById(
          "signupName"
        ).value.trim();

      let email =
        document.getElementById(
          "signupEmail"
        ).value.trim();

      let password =
        document.getElementById(
          "signupPassword"
        ).value;

      let confirm =
        document.getElementById(
          "confirmPassword"
        ).value;

      let recovery =
        document.getElementById(
          "signupRecovery"
        ).value.trim();

      let message =
        document.getElementById(
          "message"
        );

      if (
        !name ||
        !email ||
        !password ||
        !confirm || 
        !recovery

      ) {

        message.innerHTML =
          "❌ Fill all fields";

        message.style.color =
          "red";

        return;
      }

      if (password !== confirm) {

        message.innerHTML =
          "❌ Password not match";

        message.style.color =
          "red";

        return;
      }

      let users =
        JSON.parse(
          localStorage.getItem(
            "ledgerUsers"
          )
        ) || [];

      let already =
        users.find(
          u => u.email === email
        );

      if (already) {

        message.innerHTML =
          "❌ Email already exists";

        message.style.color =
          "red";

        return;
      }

      users.push({
        name,
        email,
        password,
        recovery
      });

      localStorage.setItem(
        "ledgerUsers",
        JSON.stringify(users)
      );

      localStorage.setItem(
        "ledgerLoggedIn",
        "true"
      );

     localStorage.setItem(
  "ledgerCurrentUser",
  JSON.stringify({
    name: name,
    email: email,
    password: password,
    recovery: recovery
  })
);
      message.innerHTML =
        "✅ Account Created";

      message.style.color =
        "green";


      setTimeout(() => {
        showWelcome(name);
      }, 500);

    }




function loginUser(){

  let lang =
  localStorage.getItem(
    "appLang"
  ) || "en";

  let t = langData[lang];

  let email =
  document.getElementById(
    "loginEmail"
  ).value.trim().toLowerCase();

  let password =
  document.getElementById(
    "loginPassword"
  ).value.trim();

  let message =
  document.getElementById(
    "message"
  );

  let users = JSON.parse(
    localStorage.getItem(
      "ledgerUsers"
    )
  ) || [];

  // 🔍 email check
  let user = users.find(
    u => u.email === email
  );

  // ❌ email not found
  if(!user){

    message.innerHTML =
    t.emailNotFound;

    message.style.color =
    "red";

    return;
  }

  // ❌ wrong password
  if(user.password !== password){

    message.innerHTML =
    t.wrongPassword;

    message.style.color =
    "red";

    return;
  }

  // ✅ login success
  localStorage.setItem(
    "ledgerLoggedIn",
    "true"
  );

  localStorage.setItem(
    "ledgerCurrentUser",
    JSON.stringify(user)
  );

  message.innerHTML =
  t.loginSuccess;

  message.style.color =
  "green";

  setTimeout(()=>{

    location.href =
    "index.html";

  },1000);

}
    function forgotPassword(){

  let email =
  prompt("Enter Email");

  if(!email) return;

  let users =
  JSON.parse(
    localStorage.getItem(
      "ledgerUsers"
    )
  ) || [];

  let user =
  users.find(
    u => u.email === email.toLowerCase()
  );

  if(!user){

    alert("No account found");
    return;
  }

  let answer =
  prompt(
    "Enter Recovery Word"
  );

  if(answer === user.recovery){

    let newPass =
    prompt(
      "Enter New Password"
    );

    user.password = newPass;

    localStorage.setItem(
      "ledgerUsers",
      JSON.stringify(users)
    );

    alert(
      "Password Updated"
    );

  } else {

    alert(
      "Wrong Recovery Word"
    );
  }
}

}

    function checkFirstLanguage(lang){

  // ✅ language selected
  if(lang){

    localStorage.setItem(
      "appLang",
      lang
    );

    document.getElementById(
      "languagePopup"
    ).style.display = "none";

    applyLanguage();

    return;
  }

  // ✅ first check
  let savedLang =
  localStorage.getItem(
    "appLang"
  );

  if(!savedLang){

    document.getElementById(
      "languagePopup"
    ).style.display = "flex";

  }

  else{

    applyLanguage();

  }
}
  window.onload = function(){

  checkFirstLanguage();
  applyLanguage();

};
